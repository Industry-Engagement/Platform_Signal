<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>City Section</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ---- Control panels (left side) ---- */
  #controls {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 380px;
  }
  .panel { margin-bottom: 26px; }
  .panel-header {
    display: inline-block;
    background: var(--theme1-mid, #72a391);
    color: #ffffff;
    font-weight: bold;
    font-size: 22px;
    padding: 8px 16px;
  }
  .panel-box {
    background: #ffffff;
    border: 1px solid #b0b0b0;
    padding: 14px 18px 18px;
  }
  .group-label {
    font-weight: bold;
    font-size: 18px;
    margin: 4px 0 8px;
  }
  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }
  .btn-row:last-child { margin-bottom: 0; }

  /* Route buttons */
  .route-btn {
    color: #ffffff;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    user-select: none;
    box-sizing: border-box;
  }
  .route-btn.circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .route-btn.pill {
    padding: 7px 14px;
    border-radius: 8px;
  }

  /* Source buttons */
  .source-btn {
    width: fit-content;
    font-weight: bold;
    font-size: 20px;
    padding: 4px 8px;
    margin-bottom: 4px;
    cursor: pointer;
    user-select: none;
    background: #ffffff;
    color: var(--subway-l, #737373);
  }
  .source-btn.selected {
    background: var(--theme1-li, #cfeadf);
    color: var(--na, #000000);
  }
</style>
</head>
<body>
  <svg id="stage" xmlns="http://www.w3.org/2000/svg">
    <rect id="ground"></rect>
    <line id="groundLine" stroke="#000000" stroke-width="2"></line>
    <g id="ticks" stroke="#000000" stroke-width="2"></g>
    <line id="subwayLine" stroke="#e3a15f" stroke-width="4" stroke-linecap="round"></line>
    <g id="routeLines"></g>
  </svg>

  <div id="controls">
    <div class="panel">
      <div class="panel-header">Add a Route</div>
      <div class="panel-box">
        <div class="group-label">Subways</div>
        <div class="btn-row" id="row-subways"></div>
        <div class="group-label">Planes</div>
        <div class="btn-row" id="row-planes"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">Choose a Source</div>
      <div class="panel-box" id="source-box"></div>
    </div>
  </div>

<script>
  // ===================== Colors =====================
  // Always define a named color variable here before using a color.
  var Theme1_Mid = "#72a391";   // panel header green
  var Theme1_Li  = "#cfeadf";   // light green highlight / selection
  var Subway_L   = "#737373";   // L train (gray)
  var Subway_6   = "#396133";   // 6 train (green)
  var Plane_B6   = "#00205B";   // JetBlue B6 (navy)
  var NA         = "#000000";   // default / unspecified (black)
  // =================================================

  // Expose the colors CSS needs as custom properties
  var root = document.documentElement.style;
  root.setProperty("--theme1-mid", Theme1_Mid);
  root.setProperty("--theme1-li", Theme1_Li);
  root.setProperty("--subway-l", Subway_L);
  root.setProperty("--na", NA);

  // ===================== Ground / scene ===============
  var GroundColor = "#e5e5e5";   // fill color of the ground
  var GroundLocation = 2 / 3;    // top of the ground, as a fraction of window height
                                 // (2/3 keeps the ground in the lower 1/3 of the window)

  var TickCount = 5;             // number of tick marks on the ground line
  var TickLength = 10;           // length of each tick mark, in px
  var SubwayDepth = 0.52;        // subway position within the ground, as a fraction of ground height
  var SubwayStart = 0.009;       // subway left end, as a fraction of window width
  var SubwayEnd = 0.868;         // subway right end, as a fraction of window width

  // Route lines drawn when a route button is selected
  var RouteLineWidth = 5;        // stroke width of route lines
  var RouteLineStart = 0.009;    // left end, as a fraction of window width
  var RouteLineEnd = 0.868;      // right end, as a fraction of window width
  var PlaneSlots = [0.74, 0.52]; // plane line height, as a fraction of the sky (from top)
  var SubwaySlots = [0.28, 0.75];// subway line depth, as a fraction of the ground
  // =================================================

  // ===================== Routes =======================
  var routes = [
    { id: "L",      label: "L",      type: "subway", color: Subway_L, shape: "circle", slot: 0 },
    { id: "6",      label: "6",      type: "subway", color: Subway_6, shape: "circle", slot: 1 },
    { id: "B6123",  label: "B6 123", type: "plane",  color: Plane_B6, shape: "pill",   slot: 0 },
    { id: "MU5736", label: "MU5736", type: "plane",  color: NA,       shape: "pill",   slot: 1 }
  ];
  var selectedRoutes = {};  // id -> true when selected

  var sources = ["Internet Connection", "Radio Frequency"];

  var ground = document.getElementById("ground");
  var groundLine = document.getElementById("groundLine");
  var ticks = document.getElementById("ticks");
  var subwayLine = document.getElementById("subwayLine");
  var routeLines = document.getElementById("routeLines");

  // ----- Build route buttons -----
  function makeRouteButton(route) {
    var b = document.createElement("div");
    b.className = "route-btn " + route.shape;
    b.textContent = route.label;
    b.style.background = route.color;
    b.addEventListener("click", function () {
      var on = !selectedRoutes[route.id];
      selectedRoutes[route.id] = on;
      // Selected: light-green stroke around the button edge
      b.style.boxShadow = on ? "0 0 0 3px " + Theme1_Li : "none";
      draw();
    });
    return b;
  }
  routes.forEach(function (r) {
    var row = document.getElementById(r.type === "subway" ? "row-subways" : "row-planes");
    row.appendChild(makeRouteButton(r));
  });

  // ----- Build source buttons -----
  var sourceBox = document.getElementById("source-box");
  sources.forEach(function (label) {
    var b = document.createElement("div");
    b.className = "source-btn";
    b.textContent = label;
    b.addEventListener("click", function () {
      b.classList.toggle("selected");   // white <-> Theme1_Li
    });
    sourceBox.appendChild(b);
  });

  // ----- Draw the scene -----
  function draw() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var groundTop = h * GroundLocation;
    var groundHeight = h - groundTop;

    // Ground
    ground.setAttribute("x", 0);
    ground.setAttribute("y", groundTop);
    ground.setAttribute("width", w);
    ground.setAttribute("height", groundHeight);
    ground.setAttribute("fill", GroundColor);

    // Ground surface line
    groundLine.setAttribute("x1", 0);
    groundLine.setAttribute("y1", groundTop);
    groundLine.setAttribute("x2", w);
    groundLine.setAttribute("y2", groundTop);

    // Tick marks, evenly spaced along the ground line
    var tickSpacing = w / (TickCount + 0.27);
    var html = "";
    for (var i = 0; i < TickCount; i++) {
      var x = 10 + i * tickSpacing;
      html += '<line x1="' + x + '" y1="' + (groundTop - TickLength) +
              '" x2="' + x + '" y2="' + groundTop + '"></line>';
    }
    ticks.innerHTML = html;

    // Subway line
    var subwayY = groundTop + groundHeight * SubwayDepth;
    subwayLine.setAttribute("x1", w * SubwayStart);
    subwayLine.setAttribute("y1", subwayY);
    subwayLine.setAttribute("x2", w * SubwayEnd);
    subwayLine.setAttribute("y2", subwayY);

    // Selected route lines (plane routes above ground, subway routes below)
    var lines = "";
    routes.forEach(function (r) {
      if (!selectedRoutes[r.id]) return;
      var y = r.type === "plane"
        ? groundTop * PlaneSlots[r.slot]
        : groundTop + groundHeight * SubwaySlots[r.slot];
      lines += '<line x1="' + (w * RouteLineStart) + '" y1="' + y +
               '" x2="' + (w * RouteLineEnd) + '" y2="' + y +
               '" stroke="' + r.color + '" stroke-width="' + RouteLineWidth +
               '" stroke-linecap="round"></line>';
    });
    routeLines.innerHTML = lines;
  }

  window.addEventListener("resize", draw);
  new ResizeObserver(draw).observe(document.documentElement);
  draw();
</script>
</body>
</html>
